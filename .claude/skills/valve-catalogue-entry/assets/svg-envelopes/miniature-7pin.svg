<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" aria-label="Miniature 7-pin (B7G) valve.">
  <defs>
    <linearGradient id="glass3" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#dfe6ec"/>
      <stop offset="0.5" stop-color="#f6f9fc"/>
      <stop offset="1" stop-color="#b8c2cb"/>
    </linearGradient>
  </defs>
  <!-- small tubular envelope -->
  <path d="M75,40 Q75,30 100,30 Q125,30 125,40 L125,210 Q125,220 100,220 Q75,220 75,210 Z" fill="url(#glass3)" stroke="#3a3a3a" stroke-width="1.3"/>
  <rect x="88" y="70" width="24" height="110" fill="#3b3b3b" stroke="#222" stroke-width="0.8"/>
  <path d="M93,180 Q100,200 107,180" fill="none" stroke="#c84a14" stroke-width="1.3"/>
  <!-- 7 pins emerging from base of glass (no skirt — miniatures don't have one) -->
  <g fill="#b9a37a" stroke="#6a5b3e">
    <rect x="78" y="220" width="3" height="28" rx="1"/>
    <rect x="86" y="222" width="3" height="26" rx="1"/>
    <rect x="94" y="223" width="3" height="25" rx="1"/>
    <rect x="103" y="223" width="3" height="25" rx="1"/>
    <rect x="111" y="222" width="3" height="26" rx="1"/>
    <rect x="119" y="220" width="3" height="28" rx="1"/>
    <rect x="98.5" y="225" width="3" height="23" rx="1"/>
  </g>
  <text x="100" y="135" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="11" fill="#e7d6a8" letter-spacing="1.5">{{CODE}}</text>
</svg>
