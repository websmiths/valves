<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" aria-label="GT/G-shape valve with octal base.">
  <defs>
    <linearGradient id="glass2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#dfe6ec"/>
      <stop offset="0.5" stop-color="#f6f9fc"/>
      <stop offset="1" stop-color="#b8c2cb"/>
    </linearGradient>
    <linearGradient id="base2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a1f15"/>
      <stop offset="1" stop-color="#181009"/>
    </linearGradient>
  </defs>
  <!-- straight-sided GT envelope -->
  <path d="M60,30 Q60,18 100,18 Q140,18 140,30 L140,170 Q140,180 100,180 Q60,180 60,170 Z" fill="url(#glass2)" stroke="#3a3a3a" stroke-width="1.3"/>
  <circle cx="100" cy="18" r="3" fill="#222"/>
  <rect x="80" y="55" width="40" height="70" fill="#3b3b3b" stroke="#222" stroke-width="0.8"/>
  <path d="M88,135 Q100,150 112,135" fill="none" stroke="#c84a14" stroke-width="1.3"/>
  <!-- octal base -->
  <rect x="55" y="180" width="90" height="40" rx="4" fill="url(#base2)"/>
  <rect x="55" y="180" width="90" height="6" fill="#0d0805"/>
  <!-- key in the centre -->
  <rect x="96" y="218" width="8" height="32" rx="2" fill="#2a2018" stroke="#0d0805"/>
  <!-- 8 pins in a circle -->
  <g fill="#b9a37a" stroke="#6a5b3e">
    <rect x="73" y="220" width="4" height="26" rx="1.5"/>
    <rect x="83" y="222" width="4" height="24" rx="1.5"/>
    <rect x="92" y="223" width="4" height="22" rx="1.5"/>
    <rect x="104" y="223" width="4" height="22" rx="1.5"/>
    <rect x="113" y="222" width="4" height="24" rx="1.5"/>
    <rect x="123" y="220" width="4" height="26" rx="1.5"/>
    <rect x="63" y="216" width="4" height="28" rx="1.5"/>
    <rect x="133" y="216" width="4" height="28" rx="1.5"/>
  </g>
  <text x="100" y="206" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="9" fill="#e7d6a8" letter-spacing="1.5">{{CODE}}</text>
</svg>
