name: Process valve submission

on:
  push:
    branches: [main]
    # Only fire on image commits. The Worker creates two commits per
    # submission (image, then note) — without this filter, both fire the
    # workflow and we pay for the cataloguing twice. The note file is
    # still picked up by list_submissions.py, which scans the directory
    # at run time.
    paths:
      - "src-images/submissions/*.jpg"
      - "src-images/submissions/*.jpeg"
      - "src-images/submissions/*.png"
      - "src-images/submissions/*.webp"

# One submission processed at a time — keeps PR numbering and entry IDs
# from racing. We don't cancel in-progress runs because they're doing
# real work.
concurrency:
  group: process-submissions
  cancel-in-progress: false

jobs:
  process:
    # Don't loop on the bot's own commits (they remove files from
    # src-images/submissions/, which would otherwise re-trigger this).
    if: "!contains(github.event.head_commit.message, '[bot]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      # Toggle which Anthropic key this run uses by setting the repo variable
      # USE_EVAL_KEY to "true" (Settings → Secrets and variables → Actions →
      # Variables tab). When unset or "false", the workflow uses the main
      # ANTHROPIC_API_KEY secret. When "true", it uses ANTHROPIC_API_KEY_EVAL.
      # Each key must be stored as the named repo secret beforehand.
      ANTHROPIC_API_KEY: ${{ vars.USE_EVAL_KEY == 'true' && secrets.ANTHROPIC_API_KEY_EVAL || secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        # Always work against the current tip of main, not the trigger SHA.
        # The Worker creates separate commits for image and note, so two
        # workflow runs queue up; checking out by SHA would have each run
        # working on a stale view. With ref: main, both runs see the same
        # current tree, and the second run's "exit early if no submissions"
        # check naturally short-circuits.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        # Pillow for image cropping; anthropic SDK for the single API call
        # that process_submission.py uses instead of the Claude Code CLI.
        run: pip install --quiet pillow anthropic

      - name: Scan submissions/
        id: scan
        # list_submissions.py reads GITHUB_SHA to scope this run to only
        # the image added in the triggering commit. Anything else in
        # submissions/ shows up in the "stuck" field for visibility.
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 scripts/list_submissions.py > /tmp/submissions.json
          cat /tmp/submissions.json
          {
            echo "count=$(jq -r .count /tmp/submissions.json)"
            echo "title=$(jq -r .title /tmp/submissions.json)"
            echo "summary=$(jq -r .summary /tmp/submissions.json)"
          } >> "$GITHUB_OUTPUT"
          echo "submissions<<EOF" >> "$GITHUB_OUTPUT"
          jq -c .submissions /tmp/submissions.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Loud warning if previous failed runs left files behind.
          stuck_count=$(jq '.stuck | length' /tmp/submissions.json)
          if [ "$stuck_count" -gt 0 ]; then
            echo "::warning::$stuck_count file(s) stuck in src-images/submissions/ from prior failed runs:"
            jq -r '.stuck[]' /tmp/submissions.json | while read f; do echo "::warning::  - $f"; done
            echo "::warning::These are NOT being processed by this run. Inspect and delete via the GitHub UI, or push a no-op rewrite of the image file to retry it."
          fi

      - name: Exit early if no submissions
        if: steps.scan.outputs.count == '0'
        run: |
          echo "Nothing to process — exiting cleanly."
          exit 0

      - name: Process submission with one Claude API call
        if: steps.scan.outputs.count != '0'
        env:
          # ANTHROPIC_API_KEY is inherited from job-level env (toggle-aware).
          SUBMISSION_MODEL: ${{ vars.SUBMISSION_MODEL }}
          # Defence in depth: scrub the workflow's GITHUB_TOKEN from the
          # orchestrator's env. The script only needs to read files, call
          # the Anthropic API, and write to the working tree. The token
          # gets restored automatically in the publish step after this.
          GITHUB_TOKEN: ""
        run: |
          python3 scripts/process_submission.py --submissions-json /tmp/submissions.json

      - name: Read generated PR body
        if: steps.scan.outputs.count != '0'
        id: prbody
        run: |
          if [ -f /tmp/pr-body.md ]; then
            {
              echo "body<<PRBODY"
              cat /tmp/pr-body.md
              echo
              echo "---"
              echo "Generated by the valve-catalogue-entry skill. Review the diff, fix any misreads inline, then merge to publish."
              echo "PRBODY"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<PRBODY"
              echo "Automated processing produced no PR-body summary at /tmp/pr-body.md. Inspect the diff manually before merging."
              echo "PRBODY"
            } >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────────────────────────────
      # Two publishing paths, picked by the repo variable AUTO_PUBLISH:
      #
      #   AUTO_PUBLISH = "false" (default)  → open a PR for review (safe)
      #   AUTO_PUBLISH = "true"             → commit straight to main (fast)
      #
      # Toggle in Settings → Secrets and variables → Actions → Variables.
      # Branch protection on `main` overrides this — if main is protected,
      # the direct-push path fails and you'd need to flip protection off
      # at the same time you flip AUTO_PUBLISH on.
      # ──────────────────────────────────────────────────────────────────

      - name: Publish — open pull request
        if: steps.scan.outputs.count != '0' && vars.AUTO_PUBLISH != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "submission: process ${{ steps.scan.outputs.summary }} [bot]"
          branch: submission/${{ github.run_id }}
          title: ${{ steps.scan.outputs.title }}
          body: ${{ steps.prbody.outputs.body }}
          labels: submission
          delete-branch: true

      - name: Publish — commit straight to main
        if: steps.scan.outputs.count != '0' && vars.AUTO_PUBLISH == 'true'
        run: |
          set -e
          git config user.name  "websmiths-submission-bot"
          git config user.email "bot@websmiths.invalid"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit — nothing for the bot to push."
            exit 0
          fi
          # Use the orchestrator's PR-body summary as the commit message
          # body, so `git log` retains submission notes, identified
          # boxes, confidence flags and unaccounted boxes — even though
          # we're skipping the PR step under AUTO_PUBLISH=true.
          if [ -s /tmp/pr-body.md ]; then
            git commit \
              -m "submission: ${{ steps.scan.outputs.summary }} [bot]" \
              -m "$(cat /tmp/pr-body.md)"
          else
            git commit -m "submission: ${{ steps.scan.outputs.summary }} [bot]"
          fi
          # Rebase onto current main in case another commit (e.g. the
          # Worker's separate note commit, or a manual edit) landed during
          # the Claude run. Push retries are deliberately bounded — if
          # rebase fails or remote keeps moving, fail loudly.
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after 2s"
            sleep 2
          done
          echo "Could not push after 3 attempts" >&2
          exit 1
