name: Process valve submission

on:
  push:
    branches: [main]
    paths:
      - "src-images/submissions/**"

# One submission processed at a time — keeps PR numbering and entry IDs
# from racing. We don't cancel in-progress runs because they're doing
# real work.
concurrency:
  group: process-submissions
  cancel-in-progress: false

jobs:
  process:
    # Don't loop on the bot's own commits (they remove files from
    # src-images/submissions/, which would otherwise re-trigger this).
    if: "!contains(github.event.head_commit.message, '[bot]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (used by the cropping/rotating scripts)
        run: pip install --quiet pillow

      - name: Scan submissions/
        id: scan
        run: |
          python3 scripts/list_submissions.py > /tmp/submissions.json
          cat /tmp/submissions.json
          {
            echo "count=$(jq -r .count /tmp/submissions.json)"
            echo "title=$(jq -r .title /tmp/submissions.json)"
            echo "summary=$(jq -r .summary /tmp/submissions.json)"
          } >> "$GITHUB_OUTPUT"
          echo "submissions<<EOF" >> "$GITHUB_OUTPUT"
          jq -c .submissions /tmp/submissions.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Exit early if no submissions
        if: steps.scan.outputs.count == '0'
        run: |
          echo "Nothing to process — exiting cleanly."
          exit 0

      - name: Run Claude Code with bundled skill
        if: steps.scan.outputs.count != '0'
        # NOTE: confirm the latest stable action ref at
        # https://github.com/anthropics/claude-code-action before pinning
        # tighter (e.g. to a specific SHA). v1 is the documented major
        # version at time of writing.
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            New valve-box submission(s) are sitting in src-images/submissions/.

            The pending work is described in this JSON (one entry per image):
            ${{ steps.scan.outputs.submissions }}

            For each submission:
              1. If the entry has a non-null note_file, read it — it's the
                 submitter's free-text note. Capture it for the PR body.
              2. Move the image out of src-images/submissions/ and into
                 src-images/ with a sensible incrementing name. Existing
                 numbered photos in src-images/ tell you the next free
                 number (e.g. if boxes-1.jpeg exists, the next is
                 boxes-2.jpeg). Delete the corresponding .note.txt after
                 capturing its contents.
              3. Use the bundled valve-catalogue-entry skill at
                 .claude/skills/valve-catalogue-entry/SKILL.md — its tray-mode
                 reference at .claude/skills/valve-catalogue-entry/references/tray-mode.md
                 covers the full-photo workflow. Identify every box you can
                 read, generate entries via
                 .claude/skills/valve-catalogue-entry/scripts/build_entries.py
                 (append items to ENTRIES_DATA and re-run), and update
                 index.html and README.md as the skill describes.
              4. Record any flagged items (handwritten codes, suspected
                 ambiguities, unaccounted boxes) in the README's
                 "Verification flags" section.

            Then write a PR body to /tmp/pr-body.md with the following
            sections, filled in for THIS submission batch:
              ## Submission
              - Image: <new src-images/...>
              - Submitter's note: <quoted note text, or "(none)">
              ### Boxes identified
              - <bullet list: code, brand, confidence>
              ### Confidence flags
              - <Medium / Low items that warrant a physical check>
              ### Unaccounted boxes
              - <boxes that couldn't be read, with location notes>

            Do NOT commit. Leave changes staged in the working tree —
            the next workflow step opens the PR.

      - name: Read generated PR body
        if: steps.scan.outputs.count != '0'
        id: prbody
        run: |
          if [ -f /tmp/pr-body.md ]; then
            {
              echo "body<<PRBODY"
              cat /tmp/pr-body.md
              echo
              echo "---"
              echo "Generated by the valve-catalogue-entry skill. Review the diff, fix any misreads inline, then merge to publish."
              echo "PRBODY"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<PRBODY"
              echo "Automated processing produced no PR-body summary. Inspect the diff manually."
              echo "PRBODY"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.scan.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "submission: process ${{ steps.scan.outputs.summary }} [bot]"
          branch: submission/${{ github.run_id }}
          title: ${{ steps.scan.outputs.title }}
          body: ${{ steps.prbody.outputs.body }}
          labels: submission
          delete-branch: true
